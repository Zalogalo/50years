  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r:#5a4628;overflow-x:hidden;min-height:100vh\">\n\n  <!-- ===== HERO ===== -->\n  <section style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;background:radial-gradient(ellipse at 50% 30%, #f6eddb 0%, #ecddbf 65%, #e1d1b0 100%);padding:32px 24px 80px\">\n    <div style=\"width:100%;display:flex;justify-content:center;align-items:center;gap:14px;color:#9c8762;letter-spacing:.45em;font-size:14px\">\n      <span style=\"width:46px;height:1px;background:linear-gradient(90deg,transparent,#bd9d5e)\"><\u002Fspan>\n      01.10.2026\n      <span style=\"width:46px;height:1px;background:linear-gradient(90deg,#bd9d5e,transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;padding:48px 0\">\n      \n      <h1 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(54px,11vw,140px);line-height:.96;letter-spacing:.04em;color:#5e4a2c;text-shadow:0 2px 24px rgba(160,130,70,.18)\">НАТАЛЬЯ<\u002Fh1>\n      <div style=\"display:flex;align-items:center;gap:26px;margin:18px 0 8px\">\n        <span style=\"width:70px;height:1px;background:linear-gradient(90deg,transparent,#bd9d5e)\"><\u002Fspan>\n        <span style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(60px,13vw,150px);line-height:1;color:#b7964f\">50<\u002Fspan>\n        <span style=\"width:70px;height:1px;background:linear-gradient(90deg,#bd9d5e,transparent)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'Marck Script',cursive;font-size:clamp(34px,6vw,72px);color:#8f7647;line-height:1.05\">Юбилей<\u002Fdiv>\n      <p style=\"margin-top:30px;max-width:440px;font-size:19px;line-height:1.7;color:#8a7654;font-style:italic\">Сердечно приглашаем разделить этот тёплый праздничный вечер<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;color:#a3906c\">\n      <span style=\"font-size:13px;letter-spacing:.3em\">ЛИСТАЙТЕ ВНИЗ<\u002Fspan>\n      <span style=\"font-size:20px\">⌄<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- divider -> ivory -->\n  <div style=\"background:#e1d1b0;line-height:0\"><svg viewBox=\"0 0 1440 80\" preserveAspectRatio=\"none\" style=\"display:block;width:100%;height:64px\"><path d=\"M0,46 C160,8 320,58 480,32 C640,6 800,52 960,30 C1120,8 1280,50 1440,26 L1440,80 L0,80 Z\" fill=\"#faf5ec\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n  <!-- ===== GREETING ===== -->\n  <section style=\"background:#faf5ec;color:#5a4628;padding:40px 24px 70px\">\n    <div style=\"max-width:1040px;margin:0 auto;display:flex;flex-wrap:wrap;gap:48px;align-items:center;justify-content:center\">\n      <div style=\"flex:1;min-width:300px;max-width:480px\">\n        <div style=\"font-family:'Marck Script',cursive;font-size:clamp(32px,5vw,52px);color:#ab8842;line-height:1.15;margin-bottom:24px\">Дорогие друзья<br>и близкие!<\u002Fdiv>\n        <p style=\"font-size:21px;line-height:1.8;color:#6e5a3a;font-weight:400\">Полвека — это целая история, наполненная любовью, теплом и дорогими сердцу людьми. В этот особенный день мне хочется собрать рядом тех, кто мне по-настоящему близок.<\u002Fp>\n        <p style=\"font-size:21px;line-height:1.8;color:#6e5a3a;margin-top:18px\">Буду счастлива видеть вас на праздновании моего юбилея. Ваше присутствие станет лучшим подарком!<\u002Fp>\n        <div style=\"margin-top:28px;font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:#ab8842\">С теплом, Наталья<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- empty photo slot -->\n      <div style=\"flex:0 0 auto;width:320px;max-width:100%\">\n        <div style=\"aspect-ratio:4/5;border:2px dashed #cdb585;border-radius:4px;background:#f3ebda;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#b6a06e\">\n          <svg width=\"56\" height=\"56\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"3.2\"><\u002Fcircle><path d=\"M8 5l1.2-2h5.6L16 5\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:15px;letter-spacing:.18em\">ФОТО ЮБИЛЯРА<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- divider -> champagne -->\n  <div style=\"background:#faf5ec;line-height:0\"><svg viewBox=\"0 0 1440 80\" preserveAspectRatio=\"none\" style=\"display:block;width:100%;height:64px\"><path d=\"M0,40 C150,10 300,54 470,30 C640,6 790,50 960,28 C1130,6 1290,48 1440,24 L1440,80 L0,80 Z\" fill=\"#e6d7ba\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n  <!-- ===== DATE + COUNTDOWN ===== -->\n  <section style=\"background:linear-gradient(180deg,#e6d7ba,#e9dcc1);padding:30px 24px 80px;text-align:center\">\n    <div style=\"font-family:'Marck Script',cursive;font-size:clamp(30px,5vw,48px);color:#ab8842\">Дата<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(28px,4.5vw,46px);letter-spacing:.08em;color:#5e4a2c;margin-top:4px\">ПРОВЕДЕНИЯ ЮБИЛЕЯ<\u002Fh2>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:18px;margin:26px 0 8px;color:#8a7654\">\n      <span style=\"width:50px;height:1px;background:#bd9d5e\"><\u002Fspan>\n      <span style=\"font-family:'Playfair Display',serif;font-style:italic;font-size:24px;letter-spacing:.12em\">1 октября 2026<\u002Fspan>\n      <span style=\"width:50px;height:1px;background:#bd9d5e\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- calendar -->\n    <div style=\"max-width:420px;margin:34px auto 0;background:rgba(255,255,255,.45);border:1px solid rgba(150,118,58,.35);border-radius:8px;padding:22px 18px\">\n      <div style=\"font-family:'Playfair Display',serif;letter-spacing:.2em;font-size:15px;color:#a9843c;margin-bottom:16px\">ОКТЯБРЬ 2026<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:14px;color:#a08a5e;margin-bottom:8px\">\n        <span>Пн<\u002Fspan><span>Вт<\u002Fspan><span>Ср<\u002Fspan><span>Чт<\u002Fspan><span>Пт<\u002Fspan><span>Сб<\u002Fspan><span>Вс<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ calWeeks }}\" as=\"week\" hint-placeholder-count=\"5\">\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px\">\n          <sc-for list=\"{{ week }}\" as=\"cell\" hint-placeholder-count=\"7\">\n            <div style=\"aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:16px;color:#6e5a3a\">\n              <sc-if value=\"{{ cell.target }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#bd9d5e;color:#fff;font-weight:600;box-shadow:0 2px 14px rgba(160,120,50,.45)\">{{ cell.day }}<\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ cell.plain }}\" hint-placeholder-val=\"{{ true }}\">\n                <span>{{ cell.day }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- countdown -->\n    <div style=\"margin-top:46px\">\n      <div style=\"font-family:'Marck Script',cursive;font-size:28px;color:#ab8842;margin-bottom:20px\">До праздника осталось<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;gap:14px;flex-wrap:wrap\">\n        <div style=\"min-width:92px;background:rgba(255,255,255,.5);border:1px solid rgba(150,118,58,.35);border-radius:8px;padding:18px 10px\">\n          <div class=\"num-flip\" style=\"font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,52px);color:#5e4a2c;line-height:1\">{{ daysPad }}<\u002Fdiv>\n          <div style=\"font-size:13px;letter-spacing:.2em;color:#a08a5e;margin-top:6px\">ДНЕЙ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:92px;background:rgba(255,255,255,.5);border:1px solid rgba(150,118,58,.35);border-radius:8px;padding:18px 10px\">\n          <div class=\"num-flip\" style=\"font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,52px);color:#5e4a2c;line-height:1\">{{ hours }}<\u002Fdiv>\n          <div style=\"font-size:13px;letter-spacing:.2em;color:#a08a5e;margin-top:6px\">ЧАСОВ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:92px;background:rgba(255,255,255,.5);border:1px solid rgba(150,118,58,.35);border-radius:8px;padding:18px 10px\">\n          <div class=\"num-flip\" style=\"font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,52px);color:#5e4a2c;line-height:1\">{{ mins }}<\u002Fdiv>\n          <div style=\"font-size:13px;letter-spacing:.2em;color:#a08a5e;margin-top:6px\">МИНУТ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:92px;background:rgba(255,255,255,.5);border:1px solid rgba(150,118,58,.35);border-radius:8px;padding:18px 10px\">\n          <div class=\"num-flip\" style=\"font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,52px);color:#ab8842;line-height:1\">{{ secs }}<\u002Fdiv>\n          <div style=\"font-size:13px;letter-spacing:.2em;color:#a08a5e;margin-top:6px\">СЕКУНД<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- divider -> ivory -->\n  <div style=\"background:#e9dcc1;line-height:0\"><svg viewBox=\"0 0 1440 80\" preserveAspectRatio=\"none\" style=\"display:block;width:100%;height:64px\"><path d=\"M0,44 C170,12 320,56 490,30 C650,8 800,50 960,30 C1120,8 1290,52 1440,28 L1440,80 L0,80 Z\" fill=\"#faf5ec\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n  <!-- ===== PROGRAMME ===== -->\n  <section style=\"background:#faf5ec;color:#5a4628;padding:40px 24px 80px\">\n    <div style=\"text-align:center;margin-bottom:46px\">\n      <div style=\"font-family:'Marck Script',cursive;font-size:clamp(30px,5vw,48px);color:#ab8842\">Программа<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(26px,4vw,40px);letter-spacing:.08em;color:#5a4628\">ТОРЖЕСТВЕННОГО ВЕЧЕРА<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:0\">\n      <sc-for list=\"{{ programme }}\" as=\"item\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;gap:22px;align-items:flex-start\">\n          <div style=\"flex:0 0 auto;width:84px;text-align:right;font-family:'Playfair Display',serif;font-size:24px;color:#ab8842;padding-top:2px\">{{ item.time }}<\u002Fdiv>\n          <div style=\"flex:0 0 auto;display:flex;flex-direction:column;align-items:center;align-self:stretch\">\n            <span style=\"width:14px;height:14px;border-radius:50%;border:2px solid #bd9d5e;background:#faf5ec\"><\u002Fspan>\n            <span style=\"flex:1;width:2px;background:linear-gradient(#bd9d5e,#ecddc0)\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1;padding-bottom:34px\">\n            <div style=\"font-family:'Playfair Display',serif;font-size:23px;color:#5a4628\">{{ item.title }}<\u002Fdiv>\n            <div style=\"font-size:18px;color:#7a6541;margin-top:3px\">{{ item.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== VENUE ===== -->\n  <section style=\"background:#faf5ec;color:#5a4628;padding:40px 24px 70px\">\n    <div style=\"text-align:center;margin-bottom:40px\">\n      <div style=\"font-family:'Marck Script',cursive;font-size:clamp(30px,5vw,48px);color:#ab8842\">Место<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(26px,4vw,40px);letter-spacing:.08em;color:#5a4628\">ПРОВЕДЕНИЯ<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;gap:36px;align-items:stretch;justify-content:center\">\n      <div style=\"flex:1;min-width:280px;max-width:420px;display:flex;flex-direction:column;justify-content:center;gap:18px\">\n        <div>\n          <div style=\"font-size:14px;letter-spacing:.2em;color:#ab8842\">МЕСТО<\u002Fdiv>\n          <div style=\"font-family:'Playfair Display',serif;font-size:28px;color:#5a4628;margin-top:4px\">Ресторан «Строгов»<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:14px;letter-spacing:.2em;color:#ab8842\">АДРЕС<\u002Fdiv>\n          <div style=\"font-size:21px;color:#7a6541;margin-top:4px\">ул. Заломова, 2<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:14px;letter-spacing:.2em;color:#ab8842\">ГОРОД<\u002Fdiv>\n          <div style=\"font-size:21px;color:#7a6541;margin-top:4px\">Нижний Новгород<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:14px;letter-spacing:.2em;color:#ab8842\">НАЧАЛО<\u002Fdiv>\n          <div style=\"font-size:21px;color:#7a6541;margin-top:4px\">16:00<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:280px;max-width:500px;display:flex;flex-direction:column;gap:14px\">\n        <div style=\"position:relative;aspect-ratio:4/3;border:2px solid #cdb585;border-radius:6px;overflow:hidden;box-shadow:0 6px 24px rgba(150,118,58,.16)\">\n          <iframe title=\"Яндекс Карта\" src=\"https://yandex.ru/map-widget/v1/?text=%D0%9D%D0%B8%D0%B6%D0%BD%D0%B8%D0%B9+%D0%9D%D0%BE%D0%B2%D0%B3%D0%BE%D1%80%D0%BE%D0%B4%2C+%D1%83%D0%BB%D0%B8%D1%86%D0%B0+%D0%97%D0%B0%D0%BB%D0%BE%D0%BC%D0%BE%D0%B2%D0%B0%2C+2&amp;z=17&amp;l=map\" width=\"100%\" height=\"100%\" frameborder=\"0\" allowfullscreen=\"true\" style=\"border:0;display:block;filter:sepia(.15) saturate(.9)\"><\u002Fiframe>\n          <div style=\"position:absolute;left:12px;bottom:12px;right:12px;display:flex;align-items:center;gap:10px;background:rgba(250,245,236,.95);border:1px solid rgba(150,118,58,.3);border-radius:6px;padding:9px 13px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ab8842\" stroke-width=\"1.5\" style=\"flex:0 0 auto\"><path d=\"M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"2.6\"><\u002Fcircle><\u002Fsvg>\n            <div>\n              <div style=\"font-family:'Playfair Display',serif;font-size:17px;color:#5a4628\">Ресторан «Строгов»<\u002Fdiv>\n              <div style=\"font-size:14px;color:#7a6541\">ул. Заломова, 2 · Нижний Новгород<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"https://yandex.ru/maps/?text=%D0%9D%D0%B8%D0%B6%D0%BD%D0%B8%D0%B9+%D0%9D%D0%BE%D0%B2%D0%B3%D0%BE%D1%80%D0%BE%D0%B4%2C+%D1%83%D0%BB.+%D0%97%D0%B0%D0%BB%D0%BE%D0%BC%D0%BE%D0%B2%D0%B0%2C+2\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:6px;font-family:'Playfair Display',serif;font-size:17px;color:#ab8842;text-decoration:none;border-bottom:1px solid rgba(171,136,66,.4);padding-bottom:2px;align-self:flex-start\">Открыть в Яндекс.Картах →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- divider -> champagne -->\n  <div style=\"background:#faf5ec;line-height:0\"><svg viewBox=\"0 0 1440 80\" preserveAspectRatio=\"none\" style=\"display:block;width:100%;height:64px\"><path d=\"M0,40 C150,8 320,52 480,30 C650,6 800,50 970,28 C1130,6 1290,50 1440,26 L1440,80 L0,80 Z\" fill=\"#e6d7ba\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n  <!-- ===== RSVP ===== -->\n  <section style=\"background:linear-gradient(180deg,#e6d7ba,#ddccaa);padding:30px 24px 90px;text-align:center\">\n    <div style=\"font-family:'Marck Script',cursive;font-size:clamp(30px,5vw,48px);color:#ab8842\">Подтверждение<\u002Fdiv>\n    <h2 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(24px,3.6vw,38px);letter-spacing:.08em;color:#5e4a2c;margin-bottom:14px\">ПРИСУТСТВИЯ<\u002Fh2>\n    <p style=\"max-width:440px;margin:0 auto 34px;font-size:19px;line-height:1.7;color:#8a7654;font-style:italic\">Пожалуйста, сообщите о вашем решении до 20 сентября<\u002Fp>\n\n    <div style=\"max-width:680px;margin:0 auto;background:rgba(255,255,255,.45);border:1px solid rgba(150,118,58,.25);border-radius:10px;overflow:hidden;box-shadow:0 6px 24px rgba(150,118,58,.12)\">\n      <script src=\"https://forms.yandex.ru/_static/embed.js\"><\u002Fscript>\n      <iframe src=\"https://forms.yandex.ru/u/6a34e1a790fa7b7495540f1f?iframe=1\" frameborder=\"0\" name=\"ya-form-6a34e1a790fa7b7495540f1f\" width=\"100%\" style=\"display:block;min-height:560px;border:0\"><\u002Fiframe>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:48px;display:flex;flex-direction:column;align-items:center;gap:10px\">\n      <span style=\"font-family:'Playfair Display',serif;font-size:30px;color:#ab8842\">Н · 50<\u002Fspan>\n      <span style=\"font-size:14px;letter-spacing:.3em;color:#9c855a\">1 ОКТЯБРЯ 2026 · НИЖНИЙ НОВГОРОД<\u002Fspan>\n    <\u002Fdiv>\n\n    \n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { now: Date.now(), submitted: false };\n\n  componentDidMount() {\n    this.timer = setInterval(() => this.setState({ now: Date.now() }), 1000);\n  }\n  componentWillUnmount() {\n    if (this.timer) clearInterval(this.timer);\n  }\n\n  renderVals() {\n    const pad = (n) => String(n).padStart(2, '0');\n\n    const target = new Date(2026, 9, 1, 16, 0, 0).getTime();\n    let diff = Math.max(0, target - this.state.now);\n    const totalSec = Math.floor(diff / 1000);\n    const days = Math.floor(totalSec / 86400);\n    const hours = Math.floor((totalSec % 86400) / 3600);\n    const mins = Math.floor((totalSec % 3600) / 60);\n    const secs = totalSec % 60;\n\n    const year = 2026, month = 9;\n    const startDow = (new Date(year, month, 1).getDay() + 6) % 7;\n    const daysInMonth = new Date(year, month + 1, 0).getDate();\n    const cells = [];\n    for (let i = 0; i < startDow; i++) cells.push(null);\n    for (let d = 1; d <= daysInMonth; d++) cells.push(d);\n    while (cells.length % 7 !== 0) cells.push(null);\n    const calWeeks = [];\n    for (let i = 0; i < cells.length; i += 7) {\n      calWeeks.push(cells.slice(i, i + 7).map((d) => ({\n        day: d === null ? '' : d,\n        target: d === 1,\n        plain: d !== null && d !== 1,\n      })));\n    }\n\n    const programme = [\n      { time: '16:00', title: 'Сбор гостей', desc: 'Приветственный фуршет и музыка' },\n      { time: '17:00', title: 'Торжественная часть', desc: 'Поздравления и тёплые слова' },\n      { time: '18:30', title: 'Праздничный ужин', desc: 'Банкет и развлекательная программа' },\n      { time: '20:00', title: 'Музыка и танцы', desc: 'Живой звук и любимые мелодии' },\n      { time: '22:00', title: 'Юбилейный торт', desc: 'Сладкий финал вечера' },\n    ];\n\n    const gallery = [1, 2, 3, 4, 5, 6];\n\n    return {\n      daysPad: pad(days),\n      hours: pad(hours),\n      mins: pad(mins),\n      secs: pad(secs),\n      calWeeks,\n      programme,\n      gallery,\n      notSubmitted: !this.state.submitted,\n      submitted: this.state.submitted,\n      onSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
